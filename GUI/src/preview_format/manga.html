<!doctype html>
<html lang="en" data-bs-theme="{bs_theme}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Normal Preview</title>
    <link rel="stylesheet" href="../GUI/src/preview_format/bootstrap.min.css">
    <link rel="stylesheet" href="../GUI/src/preview_format/public.css">
    <link rel="stylesheet" href="../GUI/src/preview_format/manga.css">
</head>
<body>
<div class="container-fluid px-0">
    <div class="row g-2" id="bookCards">
        {body}
    </div>
</div>

<div class="modal" id="episodeModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header flex-column align-items-stretch gap-2">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="modal-title" id="episodeTitle">Episodes</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <div class="input-group input-group-sm d-none" id="handleBtnGroup">
                        <button class="btn btn-outline-secondary" type="button" id="clearEpBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20px" height="20px" viewBox="0 0 1024 1024">
                                <path fill="currentColor" d="m899.1 869.6l-53-305.6H864c14.4 0 26-11.6 26-26V346c0-14.4-11.6-26-26-26H618V138c0-14.4-11.6-26-26-26H432c-14.4 0-26 11.6-26 26v182H160c-14.4 0-26 11.6-26 26v192c0 14.4 11.6 26 26 26h17.9l-53 305.6c-.3 1.5-.4 3-.4 4.4c0 14.4 11.6 26 26 26h723c1.5 0 3-.1 4.4-.4c14.2-2.4 23.7-15.9 21.2-30M204 390h272V182h72v208h272v104H204zm468 440V674c0-4.4-3.6-8-8-8h-48c-4.4 0-8 3.6-8 8v156H416V674c0-4.4-3.6-8-8-8h-48c-4.4 0-8 3.6-8 8v156H202.8l45.1-260H776l45.1 260z" />
                            </svg>
                        </button>
                        <button class="btn btn-outline-secondary" type="button" id="toggleAllEpBtn">All</button>
                        <button class="btn btn-outline-secondary" type="button" id="beginBtn">First~</button>
                        <input type="number" class="form-control text-center" id="EpsNumInput" value="1" min="1" step="1" inputmode="numeric" aria-label="Number of episodes to select" style="max-width: 60px;">
                        <button class="btn btn-outline-secondary" type="button" id="lastBtn">~Last</button>
                    </div>
                    <span class="badge text-bg-primary" id="epCount">0 selected</span>
                </div>
            </div>
            <div class="modal-body">
                <div id="episodeList"></div>
            </div>
        </div>
    </div>
</div>

<!-- Scan Notification Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:1050">
  <div id="scanToast" class="toast align-items-center text-bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body">
        <div class="spinner-border spinner-border-sm me-2" role="status"></div>
        <span id="scanToastBody">Scanning...</span>
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<script src="../GUI/src/preview_format/bootstrap.min.js"></script>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script src="../GUI/src/preview_format/public.js"></script>
<script src="../GUI/src/preview_format/manga.js"></script>
<script src="../GUI/src/preview_format/tasks_extend.js"></script>
</body>
</html>
