<!doctype html>
<html lang="zh-CN" data-bs-theme="bs_theme">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>发布页处理</title>
    <link rel="stylesheet" href="./bootstrap.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(90deg, #eaba662f 45%, #ffa51eca 100%);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 0;
        }
        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            max-width: 90vw;
            width: 100%;
        }
        .page-title {
            color: white;
            font-weight: 600;
            text-align: center;
            text-shadow: 
                -1px -1px 0 #000,
                1px -1px 0 #000,
                -1px 1px 0 #000,
                1px 1px 0 #000,
                0 2px 10px rgba(0, 0, 0, 0.5);
            margin: 0;
        }
        .image-container {
            width: 100%;
            max-width: 80vw;
            max-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            padding: 15px;
        }
        .image-container img {
            max-width: 100%;
            max-height: 48vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .action-button {
            width: 100%;
            padding: 18px 50px;
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            font-weight: 600;
            border-radius: 50px;
            border: none;
            background: rgba(255, 255, 255, 0.95);
            color: #764ba2;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .action-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            background: white;
            color: #ff9500;
        }
        .action-button:active {
            color: #ff9500;
            transform: translateY(-1px);
        }
        .icon {
            font-size: 1.4em;
            margin-right: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
<script src="./bootstrap.min.js"></script>
<div class="content-wrapper">
    <h2 class="page-title">CGS 获取域名过程中无法执行，请按以下动图手动处理一下</h2>
    <h4 class="page-title">选中多少个域名就测多少个，wnacg 同理 不做图了<br>⚠️若要针对域名发问，先考虑清楚并排查你的网络究竟有没问题</h2>
    <p class="page-title">📢 此页面右键菜单新增"手输域名"</p>
    <div class="image-container">
        <img src="https://img.comicguispider.nyc.mn/file/1765221404809_publisher.gif" alt="发布页面操作指引">
    </div>
    <button class="btn action-button" onclick="openPublishPage()">
        <span class="icon">🔗</span>打开发布页面
    </button>
</div>
<script>
    function openPublishPage() {window.location.href = "publish_url";}
</script>
</body>
</html>
