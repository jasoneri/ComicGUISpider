name: Schedule Test Status

on:
  schedule:
    - cron: '0 4 */5 * *'  # UTC 4 == +8 12:00
  workflow_dispatch:

jobs:
  test-suite:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/jasoneri/comicguispider-dockerimage:latest
      options: >-
          --ulimit nproc=4096:4096 
          --ulimit nofile=65536:65536 
          --security-opt seccomp=unconfined
          --dns 8.8.8.8
          --dns 114.114.114.114
    strategy:
      matrix:
        include:
          # - "jm" "ehentai" 使用本地 act 运行上传 
          - crawler_name: "kaobei"
            params: "-w 1 -k 更新 -i 2 -i2 1 -sp 50000"
          - crawler_name: "wnacg"
            params: "-w 3 -k ミモネル -i 2 -sp 50041"
          - crawler_name: "mangabz"
            params: "-w 5 -k 更新 -i 1 -i2 1 -sp 50061"

    steps:
      - uses: actions/checkout@master
      - name: Install dependencies
        run: python -m pip install PyExecJS

      - name: Run tests and Generate report
        run: |
          TODAY=$(TZ='Asia/Shanghai' date +%m-%d)
          
          set +e
          timeout 60 python crawl_only.py ${{ matrix.params }} -l INFO -dt 2>&1 | tee ${{ matrix.crawler_name }}.log
          result=$?
          item_count=$(grep -o "item_scraped_count': [0-9]*" ${{ matrix.crawler_name }}.log | grep -o "[0-9]*" || echo "0")
          if [ $result -eq 0 ] && [ "$item_count" -ge 2 ]; then
            echo '{"schemaVersion":1,"label":"'"$TODAY"'","message":"pass","color":"success"}' > __temp/status_${{ matrix.crawler_name }}.json
          else
            echo '{"schemaVersion":1,"label":"'"$TODAY"'","message":"fail","color":"critical"}' > __temp/status_${{ matrix.crawler_name }}.json
          fi

          mkdir -p __temp/badges
          cp __temp/status_${{ matrix.crawler_name }}.json __temp/badges/
          exit 0

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: badges-${{ matrix.crawler_name }}
          path: __temp/badges/

  deploy-job:
    needs: test-suite
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Merge artifacts
        run: |
          mkdir -p merged-badges
          find all-artifacts -name '*.json' -exec cp {} merged-badges/ \;
          
          set +e
          for crawler in "jm" "ehentai"; do
            curl -s "https://cgs-status-badges.pages.dev/status_${crawler}.json" -o "merged-badges/status_${crawler}.json" || true
          done

      - name: Deploy to CloudFlare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy merged-badges/ --project-name=cgs-status-badges --branch=main
