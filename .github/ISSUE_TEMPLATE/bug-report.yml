name: Bug Report 🐛
description: 创建 Bug 报告以帮助我们改进 / Create a report to help us improve
title: 🐛[标题这里简述这次情况/Describe simply for this situations]
assignees:
  - jasoneri
labels: bug
body:
  - type: textarea
    attributes:
      label: 🐛 描述(Description)
      description: >-
        详细地描述 bug，让大家都能理解/Describe the bug in detail so that everyone can
        understand it
    validations:
      required: true
  - type: textarea
    attributes:
      label: 📷 复现步骤(Steps to Reproduce)
      description: >-
        清晰描述复现步骤，让别人也能看到问题/Clearly describe the reproduction steps so that
        others can see the problem
      value: |-
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    attributes:
      label: ' 📄 [异常/日志]信息([Exception/Log] Information)'
      description: 如报错等其他信息可以贴在这里，或上传log文件/Other information such as crash can be posted here, or upload log file
  - type: markdown
    attributes:
      value: '## 🚑 **基本信息(Basic Information)**'
  - type: input
    attributes:
      label: 程序版本(Program version)
      description: >-
        请填写当前程序的版本号，在GUI主窗口的左上角图标右边 / Please enter the version of the
        current program, To the right of the icon in the top-left corner of the GUI-window
  - type: dropdown
    attributes:
      label: 系统(OS)
      description: 在哪些系统中出现此问题/In which systems does this problem occur
      multiple: true
      options:
        - Windows10~+
        - Windows7~-
        - macOS
    validations:
      required: true
  - type: textarea
    attributes:
      label: 📄 配置文件(Configuration file)
      description: "上传配置文件`scripts/conf.yml` 或 配置窗口的截图 (github是公开的记得脱敏!下面字段的值使用马赛克等手段模糊化)
      /Upload configure file`scripts/conf.yml` or configure-dialog screenshots (remember desensitization! The value of below field must be blur)"
      placeholder: >-
        储存路径, 代理，eh_cookies / sv_path, proxies, eh_cookies
  - type: textarea
    attributes:
      label: ' 🖼 其他截图(Screenshots)'
      description: 其他截图可以贴在这里/Screenshots of other situations can be posted here
